name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -L --fail --retry 3 --retry-delay 10 --max-time 60 \
            "https://idea-lab-moshenluo.streamlit.app/"
